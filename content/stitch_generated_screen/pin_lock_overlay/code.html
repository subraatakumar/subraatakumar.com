<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                        "charcoal": "#2d2d2d",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Public Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .pin-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 1.5px solid #2d2d2d;
            transition: background-color 0.2s;
        }
        .pin-dot.filled {
            background-color: #2d2d2d;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-charcoal dark:text-slate-100 min-h-screen flex flex-col font-display">
<!-- Header Section -->
<header class="flex flex-col items-center pt-20 pb-12 px-6">
<div class="mb-4 opacity-80">
<span class="material-symbols-outlined text-4xl text-charcoal dark:text-slate-100">shield_lock</span>
</div>
<h1 class="text-xl font-medium tracking-tight text-charcoal dark:text-slate-100">Offline Life Archive</h1>
<p class="text-sm font-light mt-2 opacity-60">Enter your secure PIN to continue</p>
</header>
<!-- PIN Entry Indicators -->
<main class="flex-1 flex flex-col items-center justify-start pt-4">
<div class="flex gap-6 mb-20">
<!-- Example: First two filled, last two empty -->
<div class="pin-dot filled dark:bg-slate-100 dark:border-slate-100"></div>
<div class="pin-dot filled dark:bg-slate-100 dark:border-slate-100"></div>
<div class="pin-dot dark:border-slate-400"></div>
<div class="pin-dot dark:border-slate-400"></div>
</div>
<!-- Numeric Keypad -->
<div class="w-full max-w-xs grid grid-cols-3 gap-y-8 gap-x-4 px-8">
<button class="flex items-center justify-center py-4 text-2xl font-light hover:bg-charcoal/5 dark:hover:bg-slate-100/5 rounded-full transition-colors">1</button>
<button class="flex items-center justify-center py-4 text-2xl font-light hover:bg-charcoal/5 dark:hover:bg-slate-100/5 rounded-full transition-colors">2</button>
<button class="flex items-center justify-center py-4 text-2xl font-light hover:bg-charcoal/5 dark:hover:bg-slate-100/5 rounded-full transition-colors">3</button>
<button class="flex items-center justify-center py-4 text-2xl font-light hover:bg-charcoal/5 dark:hover:bg-slate-100/5 rounded-full transition-colors">4</button>
<button class="flex items-center justify-center py-4 text-2xl font-light hover:bg-charcoal/5 dark:hover:bg-slate-100/5 rounded-full transition-colors">5</button>
<button class="flex items-center justify-center py-4 text-2xl font-light hover:bg-charcoal/5 dark:hover:bg-slate-100/5 rounded-full transition-colors">6</button>
<button class="flex items-center justify-center py-4 text-2xl font-light hover:bg-charcoal/5 dark:hover:bg-slate-100/5 rounded-full transition-colors">7</button>
<button class="flex items-center justify-center py-4 text-2xl font-light hover:bg-charcoal/5 dark:hover:bg-slate-100/5 rounded-full transition-colors">8</button>
<button class="flex items-center justify-center py-4 text-2xl font-light hover:bg-charcoal/5 dark:hover:bg-slate-100/5 rounded-full transition-colors">9</button>
<button class="flex items-center justify-center py-4 opacity-60 hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-2xl">fingerprint</span>
</button>
<button class="flex items-center justify-center py-4 text-2xl font-light hover:bg-charcoal/5 dark:hover:bg-slate-100/5 rounded-full transition-colors">0</button>
<button class="flex items-center justify-center py-4 opacity-60 hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-2xl">backspace</span>
</button>
</div>
</main>
<!-- Footer Actions -->
<footer class="p-8 flex justify-between items-center max-w-xs mx-auto w-full">
<button class="text-xs uppercase tracking-widest font-medium opacity-40 hover:opacity-100 transition-opacity">
            Emergency
        </button>
<button class="text-xs uppercase tracking-widest font-medium opacity-40 hover:opacity-100 transition-opacity">
            Delete
        </button>
</footer>
<!-- Subtle Background Element -->
<div class="fixed inset-0 -z-10 pointer-events-none overflow-hidden">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary/5 blur-[100px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-primary/5 blur-[100px]"></div>
</div>
</body></html>

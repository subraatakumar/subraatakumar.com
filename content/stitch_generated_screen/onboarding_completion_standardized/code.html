<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#E8601C",
                        "background-light": "#F9F9F7",
                        "background-dark": "#1a1a1a",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }</script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Main Content Area -->
<main class="flex-grow flex flex-col items-center justify-center px-8 py-12 max-w-md mx-auto w-full text-center">
<!-- Icon/Visual Anchor -->
<div class="mb-12">
<div class="w-16 h-16 rounded-full bg-primary/5 flex items-center justify-center mx-auto text-primary">
<span class="material-symbols-outlined text-3xl">shield_lock</span>
</div>
</div>
<!-- Headline -->
<h1 class="text-slate-900 dark:text-slate-100 text-4xl font-bold leading-tight mb-4 tracking-[-0.02em]">
            Your archive is ready.
        </h1>
<!-- Subtext -->
<p class="text-slate-600 dark:text-slate-400 text-[17px] font-normal leading-[1.6] mb-12 max-w-[300px] mx-auto">
            Start building your private timeline.
        </p>
<!-- Primary Action -->
<div class="w-full space-y-4">
<button class="w-full flex cursor-pointer items-center justify-center overflow-hidden rounded-lg h-14 px-8 bg-primary text-white text-base font-semibold leading-normal tracking-wide hover:opacity-90 transition-opacity">
<span class="truncate">Open Archive</span>
</button>
<!-- Secondary/Dismiss Action -->
<button class="w-full flex cursor-pointer items-center justify-center overflow-hidden rounded-lg h-12 px-8 bg-transparent text-slate-400 text-sm font-medium leading-normal hover:text-slate-600 transition-colors">
<span class="truncate">Done</span>
</button>
</div>
</main>
<!-- Footer Security Badge -->
<footer class="p-8 flex justify-center items-center gap-2 text-slate-400">
<span class="material-symbols-outlined text-sm">encrypted</span>
<span class="text-xs uppercase tracking-[0.2em] font-semibold">End-to-End Encrypted</span>
</footer>
<!-- Image Placeholder for Structure -->
<div class="hidden">
<img data-alt="Abstract minimalist architectural lines and shadows" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDiFGY4F3SWhTuGYLKn2o9hqUMKnSTxaAnCNWrxvEB_dbVkHsAV9j6R85IaKxWkZz7QFRwyHiCnM5nEfW-HBzlkpUHWORKQU-WGrwJLQQuxaqpgg0GlEmeK4iEjhUEwoMpQAzWZxk43A3AXutbZNwet5pcQ-vrRQjIcGZwZwWoOyV2dfJhKFqLtm2wlLtVDz18u6AqjRNs-ngsHMXwnWr2aVgDtkuOmk_yTM-L6dinVyopOxJSYzTpmEkIp7xn8QaWEGENlpG4mb1Y"/>
</div>
</body></html>

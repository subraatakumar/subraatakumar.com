<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Offline Life Archive - Theme Selection</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Top Navigation Bar -->
<header class="flex items-center justify-between p-6 bg-transparent">
<button class="text-slate-900 dark:text-slate-100 p-2 hover:bg-slate-200 dark:hover:bg-slate-800 rounded-full transition-colors">
<span class="material-symbols-outlined block" data-icon="arrow_back">arrow_back</span>
</button>
<div class="flex-1 text-center">
<span class="text-xs font-bold uppercase tracking-widest text-slate-500 dark:text-slate-400">Offline Life Archive</span>
</div>
<div class="w-10"></div> <!-- Spacer for symmetry -->
</header>
<main class="flex-1 max-w-lg mx-auto w-full px-6 flex flex-col">
<!-- Progress Indicator -->
<div class="mt-4 mb-12">
<div class="flex justify-between items-end mb-2">
<p class="text-sm font-medium text-slate-500 dark:text-slate-400">Step 4 of 5</p>
<p class="text-xs font-semibold text-primary">80%</p>
</div>
<div class="h-1 w-full bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full w-4/5"></div>
</div>
</div>
<!-- Header Content -->
<div class="text-center mb-12">
<h1 class="text-4xl font-bold tracking-tight text-slate-900 dark:text-slate-100 mb-4">Choose Appearance</h1>
<p class="text-lg text-slate-500 dark:text-slate-400 leading-relaxed max-w-xs mx-auto">
                Select a theme that suits your environment and helps you focus on your memories.
            </p>
</div>
<!-- Selection Cards (Scandinavian Minimalist) -->
<div class="space-y-4">
<!-- Light Mode Option -->
<label class="group relative flex items-center justify-between cursor-pointer p-6 rounded-xl border-2 border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900/50 hover:border-primary/50 transition-all">
<input checked="" class="hidden peer" name="theme-selection" type="radio" value="light"/>
<div class="flex items-center gap-5">
<div class="flex size-14 items-center justify-center rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300">
<span class="material-symbols-outlined text-3xl">light_mode</span>
</div>
<div>
<h3 class="text-lg font-semibold text-slate-900 dark:text-slate-100">Light</h3>
<p class="text-sm text-slate-500 dark:text-slate-400">Clean and bright for daylight use</p>
</div>
</div>
<div class="h-6 w-6 rounded-full border-2 border-slate-300 dark:border-slate-700 peer-checked:border-primary peer-checked:bg-primary flex items-center justify-center transition-colors">
<div class="h-2 w-2 rounded-full bg-white scale-0 peer-checked:scale-100 transition-transform"></div>
</div>
<div class="absolute inset-0 rounded-xl border-2 border-primary opacity-0 peer-checked:opacity-100 pointer-events-none"></div>
</label>
<!-- Dark Mode Option -->
<label class="group relative flex items-center justify-between cursor-pointer p-6 rounded-xl border-2 border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900/50 hover:border-primary/50 transition-all">
<input class="hidden peer" name="theme-selection" type="radio" value="dark"/>
<div class="flex items-center gap-5">
<div class="flex size-14 items-center justify-center rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300">
<span class="material-symbols-outlined text-3xl">dark_mode</span>
</div>
<div>
<h3 class="text-lg font-semibold text-slate-900 dark:text-slate-100">Dark</h3>
<p class="text-sm text-slate-500 dark:text-slate-400">Easy on the eyes in low light</p>
</div>
</div>
<div class="h-6 w-6 rounded-full border-2 border-slate-300 dark:border-slate-700 peer-checked:border-primary peer-checked:bg-primary flex items-center justify-center transition-colors">
<div class="h-2 w-2 rounded-full bg-white scale-0 peer-checked:scale-100 transition-transform"></div>
</div>
<div class="absolute inset-0 rounded-xl border-2 border-primary opacity-0 peer-checked:opacity-100 pointer-events-none"></div>
</label>
<!-- System Default Option -->
<label class="group relative flex items-center justify-between cursor-pointer p-6 rounded-xl border-2 border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900/50 hover:border-primary/50 transition-all">
<input class="hidden peer" name="theme-selection" type="radio" value="system"/>
<div class="flex items-center gap-5">
<div class="flex size-14 items-center justify-center rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300">
<span class="material-symbols-outlined text-3xl">settings_brightness</span>
</div>
<div>
<h3 class="text-lg font-semibold text-slate-900 dark:text-slate-100">System Default</h3>
<p class="text-sm text-slate-500 dark:text-slate-400">Matches your device settings</p>
</div>
</div>
<div class="h-6 w-6 rounded-full border-2 border-slate-300 dark:border-slate-700 peer-checked:border-primary peer-checked:bg-primary flex items-center justify-center transition-colors">
<div class="h-2 w-2 rounded-full bg-white scale-0 peer-checked:scale-100 transition-transform"></div>
</div>
<div class="absolute inset-0 rounded-xl border-2 border-primary opacity-0 peer-checked:opacity-100 pointer-events-none"></div>
</label>
</div>
<!-- Footer / Action Area -->
<div class="mt-auto py-12">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-5 px-8 rounded-xl shadow-lg shadow-primary/20 transition-all active:scale-[0.98]">
                Continue
            </button>
<p class="mt-6 text-center text-sm text-slate-400 dark:text-slate-500">
                You can always change this later in settings.
            </p>
</div>
</main>
<!-- Decorative Scandinavian Element -->
<div class="fixed bottom-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-slate-200 dark:via-slate-800 to-transparent opacity-50"></div>
</body></html>
